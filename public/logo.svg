<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <!-- New vibrant gradient for the droplet using a fresh coral, gold, and hot pink scheme -->
    <linearGradient id="c" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0000"/>
      <stop offset="50%" stop-color="#ff5500"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
    <linearGradient id="d" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".9"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <!-- Bottom rim light gradient fading upwards -->
    <linearGradient id="rim-gradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffea00" stop-opacity=".9"/>
      <stop offset="40%" stop-color="#ffaa00" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#ff5500" stop-opacity="0"/>
    </linearGradient>
    <!-- Adjusted shadow color to match the new warm-tone gradient -->
    <filter id="b" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#ff0055" flood-opacity=".5"/>
    </filter>
    <filter id="e" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#fff" flood-opacity=".3"/>
    </filter>
    <!-- Blur filter for soft inner rim glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
    </filter>
  </defs>

  <!-- Droplet path recalculated to be broader and slightly bigger -->
  <g filter="url(#b)">
    <path d="M 300,50 C 425,195 460,290 460,380 A 160,160 0 0,1 140,380 C 140,290 175,195 300,50 Z" fill="url(#c)"/>
  </g>

  <!-- Glowing Bottom Rim Light Overlay -->
  <path d="M 143,360 C 141,367 140,373 140,380 A 160,160 0 0,0 460,380 C 460,373 459,367 457,360 A 145,145 0 0,1 143,360 Z" fill="url(#rim-gradient)" filter="url(#glow)"/>
  
  <!-- Crisp Inner Bottom Rim Accent Line -->
  <path d="M 148,370 A 153,153 0 0,0 452,370" fill="none" stroke="#fff" stroke-width="0" stroke-linecap="round" opacity="0.4" style="mix-blend-mode: overlay;"/>

  <!-- Upper Glass Highlight -->
  <path d="M 300,90 C 410,220 440,300 440,380 A 140,140 0 0,1 160,380 C 160,300 190,220 300,90 Z" fill="none" stroke="url(#d)" stroke-width="2.5"/>

  <!-- WiFi icon scaled and re-centered perfectly to match the newly enlarged droplet -->
  <g filter="url(#e)" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round">
    <circle cx="300" cy="420" r="12" fill="#fff" stroke="none"/>
    <path d="M 270,390 A 45,45 0 0,1 330,390"/>
    <path d="M 240,360 A 84,84 0 0,1 360,360"/>
    <path d="M 210,330 A 126,126 0 0,1 390,330"/>
  </g>
</svg>
