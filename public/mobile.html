<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Send to PC">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="/manifest.json">
  <title>Send to PC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --card: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.08);
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-glow: rgba(99,102,241,0.3);
      --success: #22c55e;
      --text: #f0f0f5;
      --text2: #8888a0;
      --text3: #55556a;
      --radius: 16px;
    }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 500px 350px at 20% 0%, rgba(99,102,241,0.12), transparent),
        radial-gradient(ellipse 400px 400px at 80% 90%, rgba(139,92,246,0.08), transparent);
      pointer-events: none;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
      padding-top: env(safe-area-inset-top, 20px);
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    /* Header */
    .header {
      text-align: center;
      padding: 24px 0 20px;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .header h1 span { color: var(--accent-light); }
    .conn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--text3);
    }
    .conn .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text3);
    }
    .conn .dot.ok { background: var(--success); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
    .conn .dot.err { background: #ef4444; }

    /* Section titles */
    .section-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      margin: 24px 0 10px;
    }

    /* Install Shortcut Buttons */
    .install-cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .install-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s;
    }
    .install-card:active {
      transform: scale(0.98);
      background: rgba(255,255,255,0.08);
    }
    .install-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.4rem;
    }
    .install-icon.share { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .install-icon.clip { background: linear-gradient(135deg, #f59e0b, #ef4444); }
    .install-info h3 {
      font-size: 0.92rem;
      font-weight: 600;
    }
    .install-info p {
      font-size: 0.78rem;
      color: var(--text2);
      margin-top: 2px;
    }
    .install-arrow {
      margin-left: auto;
      color: var(--text3);
      flex-shrink: 0;
    }

    /* Sender UI */
    .sender-cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .sender-card {
      padding: 16px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
    }
    .sender-card h3 {
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .sender-card textarea {
      width: 100%;
      padding: 12px;
      font-size: 0.88rem;
      font-family: inherit;
      color: var(--text);
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      resize: none;
      outline: none;
      line-height: 1.5;
    }
    .sender-card textarea:focus {
      border-color: var(--accent);
    }
    .sender-card textarea::placeholder { color: var(--text3); }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: inherit;
      color: white;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:active { transform: scale(0.97); background: var(--accent-light); }
    .btn.success { background: var(--success); }
    .btn:disabled { opacity: 0.5; pointer-events: none; }

    .photo-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 24px;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--text2);
      background: rgba(0,0,0,0.2);
      border: 2px dashed var(--card-border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .photo-btn:active {
      border-color: var(--accent);
      background: rgba(99,102,241,0.1);
    }
    .photo-btn .icon { font-size: 1.6rem; }

    .photo-preview {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .photo-preview img {
      max-width: 100%;
      max-height: 200px;
      object-fit: contain;
      border-radius: 10px;
    }

    /* Receive from PC */
    .receive-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .receive-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      font-size: 0.82rem;
    }
    .receive-badge {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .receive-badge.text { background: rgba(99,102,241,0.15); color: var(--accent-light); }
    .receive-badge.image { background: rgba(34,197,94,0.15); color: var(--success); }
    .receive-content {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text2);
    }
    .receive-time {
      font-size: 0.7rem;
      color: var(--text3);
      flex-shrink: 0;
    }
    .empty-receive {
      text-align: center;
      padding: 20px;
      font-size: 0.82rem;
      color: var(--text3);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 24px;
      background: var(--text);
      color: var(--bg);
      border-radius: 100px;
      font-size: 0.84rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Add to Home Screen banner */
    .pwa-banner {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      background: rgba(20,20,30,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--card-border);
      display: none;
      align-items: center;
      gap: 12px;
      z-index: 50;
    }
    .pwa-banner.show { display: flex; }
    .pwa-banner .pwa-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .pwa-banner .pwa-text { flex: 1; font-size: 0.82rem; }
    .pwa-banner .pwa-text strong { display: block; font-size: 0.88rem; }
    .pwa-banner .pwa-close {
      padding: 8px;
      background: none;
      border: none;
      color: var(--text3);
      font-size: 1.2rem;
      cursor: pointer;
    }
    .pwa-banner .pwa-add {
      padding: 8px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 100px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--card-border);
      margin: 20px 0;
    }

    /* Manual shortcut fallback */
    .manual-fallback {
      padding: 16px;
      background: rgba(245,158,11,0.06);
      border: 1px solid rgba(245,158,11,0.15);
      border-radius: var(--radius);
      font-size: 0.8rem;
      color: var(--text2);
      line-height: 1.6;
    }
    .manual-fallback strong { color: #f59e0b; }
    .manual-fallback ol {
      margin: 8px 0 0 16px;
    }
    .manual-fallback li { margin-bottom: 4px; }
    .manual-fallback code {
      display: inline;
      padding: 1px 5px;
      background: rgba(0,0,0,0.3);
      border-radius: 4px;
      font-size: 0.76rem;
      color: var(--accent-light);
      word-break: break-all;
    }
    /* Skeleton Shimmer Loader */
    .skeleton-row {
      height: 44px;
      margin: 8px 0;
      border-radius: 12px;
      background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <h1>Send <span>to PC</span></h1>
      <div class="conn">
        <span class="dot" id="connDot"></span>
        <span id="connText">Connecting...</span>
      </div>
    </div>



    <!-- RECEIVE FROM PC -->
    <div class="section-title">From PC → iPhone</div>
    
    <!-- Text Inbox Box -->
    <div class="sender-card" style="margin-bottom: 12px;">
      <h3>Text Inbox</h3>
      <div class="receive-list" id="textInboxList">
        <div class="empty-receive">No texts received yet</div>
      </div>
    </div>

    <!-- File Inbox Box -->
    <div class="sender-card" style="margin-bottom: 16px;">
      <h3>File Inbox</h3>
      <div class="receive-list" id="fileInboxList">
        <div class="empty-receive">No files received yet</div>
      </div>
    </div>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 4px; gap: 12px;">
      <button class="btn" id="checkPendingBtn" style="background: rgba(255,255,255,0.08); color: var(--text2); margin: 0; flex: 1;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 4px;"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Check for new items
      </button>
      <span id="lastCheckedText" style="font-size: 0.75rem; color: var(--text3); font-weight: 500; white-space: nowrap;">Checked just now</span>
    </div>

    <div style="height: 30px;"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- PWA Install Banner -->
  <div class="pwa-banner" id="pwaBanner">
    <div class="pwa-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
    </div>
    <div class="pwa-text">
      <strong>Add to Home Screen</strong>
      Quick access anytime
    </div>
    <button class="pwa-add" id="pwaAdd">Add</button>
    <button class="pwa-close" id="pwaClose">&times;</button>
  </div>

  <script>
    const SERVER = window.location.origin;
    // (photo vars removed — not used in this page)

    // Auto-poll state
    let _autoPollTimer = null;
    let _lastCheckedTime = null;
    let _isReconnecting = false;
    let _reconnectTimer = null;
    let _reconnectCountdown = 15;

    // ─── Init ─────────────────────────────────────
    async function init() {
      setupPWA();
      checkConnection();
      document.getElementById('checkPendingBtn').addEventListener('click', () => {
        fetchPending();
        updateLastChecked();
      });
      fetchPending();
      startAutoPoll();
    }

    // ─── Auto-poll every 10 seconds ───────────────────────
    function startAutoPoll() {
      if (_autoPollTimer) clearInterval(_autoPollTimer);
      _autoPollTimer = setInterval(async () => {
        await fetchPending();
        updateLastChecked();
      }, 10000);
    }

    function updateLastChecked() {
      _lastCheckedTime = Date.now();
      const el = document.getElementById('lastCheckedText');
      if (el) el.textContent = 'Just checked';
    }

    // Update "last checked Xs ago" every second
    setInterval(() => {
      if (!_lastCheckedTime) return;
      const sec = Math.round((Date.now() - _lastCheckedTime) / 1000);
      const el = document.getElementById('lastCheckedText');
      if (el) {
        el.textContent = sec < 5 ? 'Just checked' : `Checked ${sec}s ago`;
      }
    }, 1000);

    // ─── Connection Check + Reconnect Loop ─────────────────
    async function checkConnection() {
      const dot = document.getElementById('connDot');
      const text = document.getElementById('connText');
      try {
        const res = await fetch('/api/info', { signal: AbortSignal.timeout(5000) });
        const info = await res.json();
        dot.className = 'dot ok';
        text.textContent = `Connected to ${info.ip}`;
        _isReconnecting = false;
        if (_reconnectTimer) { clearInterval(_reconnectTimer); _reconnectTimer = null; }

        // Set fallback URL
        document.querySelectorAll('.fallbackUrlText').forEach(el => el.textContent = `${info.url}/api/send`);
      } catch {
        dot.className = 'dot err';
        if (!_isReconnecting) {
          _isReconnecting = true;
          _reconnectCountdown = 15;
          _reconnectTimer = setInterval(() => {
            _reconnectCountdown--;
            if (text) text.textContent = `No connection — retrying in ${_reconnectCountdown}s`;
            if (_reconnectCountdown <= 0) {
              _reconnectCountdown = 15;
              checkConnection();
            }
          }, 1000);
        }
      }
    }

    // ─── Receive from PC ──────────────────────────────────────
    async function fetchPending() {
      showSkeleton('textInboxList');
      showSkeleton('fileInboxList');
      try {
        const res = await fetch('/api/pending');
        const data = await res.json();
        renderPending(data.items);
      } catch {
        hideSkeleton('textInboxList', 'No texts received yet');
        hideSkeleton('fileInboxList', 'No files received yet');
      }
    }

    function showSkeleton(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = `
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>`;
    }

    function hideSkeleton(id, msg) {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = `<div class="empty-receive">${msg}</div>`;
    }

    function getFileTypeIcon(mimeType) {
      if (!mimeType) return '📄';
      const type = mimeType.toLowerCase();
      if (type.startsWith('image/')) return '🖼️';
      if (type.startsWith('video/')) return '🎥';
      if (type.startsWith('audio/')) return '🎵';
      if (type.includes('pdf')) return '📄';
      if (type.includes('zip') || type.includes('rar') || type.includes('7z') || type.includes('tar') || type.includes('gzip')) return '🗃️';
      if (type.includes('word') || type.includes('document') || type.includes('officedocument')) return '📝';
      if (type.includes('sheet') || type.includes('excel') || type.includes('csv')) return '📊';
      if (type.includes('presentation') || type.includes('powerpoint')) return '📊';
      if (type.includes('text/')) return '📋';
      return '📄';
    }

    function renderPending(items) {
      const textList = document.getElementById('textInboxList');
      const fileList = document.getElementById('fileInboxList');
      if (!textList || !fileList) return;

      const textItems = (items || []).filter(item => item.type === 'text');
      const fileItems = (items || []).filter(item => item.type !== 'text');

      if (textItems.length === 0) {
        textList.innerHTML = '<div class="empty-receive">No texts received yet</div>';
      } else {
        textList.innerHTML = textItems.map(item => `
          <div class="receive-item" onclick="handleReceiveText('${escapeAttr(item.content)}', '${escapeAttr(item.id)}')">
            <span class="receive-badge text">Copy</span>
            <span class="receive-content">${escapeHtml(item.content)}</span>
            <span class="receive-time">${timeAgo(item.timestamp)}</span>
          </div>
        `).join('');
      }

      if (fileItems.length === 0) {
        fileList.innerHTML = '<div class="empty-receive">No files received yet</div>';
      } else {
        fileList.innerHTML = fileItems.map(item => {
          const isImg = item.type === 'image';
          const downloadUrl = isImg 
            ? (item.filename ? `/received/${item.filename}` : item.url)
            : `/received/${item.filename}`;
          const displayName = isImg ? (item.filename || 'Image') : (item.originalName || item.filename || 'File');
          const mime = item.mimeType || item.mimetype || (isImg ? 'image/jpeg' : '');
          const icon = getFileTypeIcon(mime);
          return `
            <div class="receive-item" style="cursor: default;">
              <span style="font-size: 1.15rem; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px;">${icon}</span>
              <span class="receive-content">${escapeHtml(displayName)}</span>
              <a href="${downloadUrl}" download="${escapeAttr(displayName)}" style="color:var(--accent-light);font-size:0.78rem;font-weight:600;text-decoration:none;margin-left:auto;white-space:nowrap;">Download</a>
            </div>
          `;
        }).join('');
      }
    }

    async function handleReceiveText(text, itemId) {
      try {
        await navigator.clipboard.writeText(text);
        showToast('Copied to clipboard');
      } catch {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Copied to clipboard');
      }
      // Acknowledge item on server so it's removed from pending
      if (itemId) {
        try {
          await fetch(`/api/pending/${itemId}/ack`, { method: 'POST' });
        } catch { /* silent */ }
      }
      // Refresh inbox after ack
      fetchPending();
    }

    // ─── PWA Install Banner ───────────────────────────────────
    function setupPWA() {
      let deferredPrompt = null;

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Show banner after a delay
        setTimeout(() => {
          document.getElementById('pwaBanner').classList.add('show');
        }, 2000);
      });

      document.getElementById('pwaAdd').addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const result = await deferredPrompt.userChoice;
          if (result.outcome === 'accepted') {
            showToast('Added to Home Screen!');
          }
          deferredPrompt = null;
        }
        document.getElementById('pwaBanner').classList.remove('show');
      });

      document.getElementById('pwaClose').addEventListener('click', () => {
        document.getElementById('pwaBanner').classList.remove('show');
      });

      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
    }

    // ─── Utilities ────────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function escapeHtml(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function escapeAttr(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1) return 'now';
      if (m < 60) return m + 'm';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h';
      return Math.floor(h / 24) + 'd';
    }

    // ─── Start ────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', init);
  </script>
  <!-- Footer -->
  <div style="text-align: center; padding: 20px; font-size: 11px; color: var(--text3); margin-top: 20px;">
    Created by Asep Sayyad | <a href="https://github.com/asepsayyad007" target="_blank" style="color: var(--primary); text-decoration: none;">github.com/asepsayyad007</a>
  </div>
</body>
</html>
