<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AiroDrop — Device Authentication</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #07070a;
      --card-bg: rgba(18, 18, 26, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent: #ff5500;
      --accent-glow: rgba(255, 85, 0, 0.35);
      --text-main: #f0f0f5;
      --text-muted: rgba(240, 240, 245, 0.55);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: absolute;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      filter: blur(40px);
    }

    .auth-card {
      width: 100%;
      max-width: 380px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 10;
    }

    .logo-container {
      width: 68px;
      height: 68px;
      background: rgba(255, 85, 0, 0.1);
      border: 1px solid rgba(255, 85, 0, 0.3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .logo-container img {
      width: 44px;
      height: 44px;
      object-fit: contain;
    }

    h1 {
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }

    p.description {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.45;
      margin-bottom: 28px;
    }

    /* 4-Digit Input Boxes */
    .pin-input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      justify-content: center;
    }

    .pin-box {
      width: 58px;
      height: 64px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-main);
      text-align: center;
      outline: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      caret-color: var(--accent);
    }

    .pin-box:focus {
      border-color: var(--accent);
      background: rgba(255, 85, 0, 0.08);
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff5500 0%, #e04400 100%);
      color: white;
      box-shadow: 0 8px 20px var(--accent-glow);
      margin-bottom: 12px;
    }

    .btn-primary:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn-secondary:active {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    /* Device name input */
    .device-name-container {
      width: 100%;
      margin-bottom: 20px;
    }

    .device-name-input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 0.82rem;
      outline: none;
      text-align: center;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(50px);
      opacity: 0;
      background: rgba(30, 30, 40, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 0.82rem;
      color: white;
      backdrop-filter: blur(16px);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 100;
      pointer-events: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.error {
      border-color: rgba(255, 75, 75, 0.5);
      color: #ff6b6b;
    }

    .toast.success {
      border-color: rgba(50, 205, 50, 0.5);
      color: #51cf66;
    }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="logo-container">
      <img src="/logo.png" alt="AiroDrop Logo">
    </div>

    <h1>Device Pairing Required</h1>
    <p class="description">Enter the 4-digit PIN code displayed on your PC screen, or request Host Approval to pair this device.</p>

    <!-- Hidden full pin collector -->
    <div class="pin-input-group">
      <input type="number" pattern="[0-9]*" inputmode="numeric" maxlength="1" class="pin-box" id="pin1" autofocus autocomplete="off">
      <input type="number" pattern="[0-9]*" inputmode="numeric" maxlength="1" class="pin-box" id="pin2" autocomplete="off">
      <input type="number" pattern="[0-9]*" inputmode="numeric" maxlength="1" class="pin-box" id="pin3" autocomplete="off">
      <input type="number" pattern="[0-9]*" inputmode="numeric" maxlength="1" class="pin-box" id="pin4" autocomplete="off">
    </div>

    <div class="device-name-container">
      <input type="text" id="deviceNameInput" class="device-name-input" placeholder="Device Name (e.g. My iPhone)">
    </div>

    <button id="btnSubmitPin" class="btn btn-primary">
      <span>Unlock & Pair Device</span>
    </button>

    <button id="btnRequestApproval" class="btn btn-secondary">
      <span>Request PC Host Approval</span>
    </button>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const pinBoxes = [
      document.getElementById('pin1'),
      document.getElementById('pin2'),
      document.getElementById('pin3'),
      document.getElementById('pin4')
    ];
    const deviceNameInput = document.getElementById('deviceNameInput');
    const btnSubmitPin = document.getElementById('btnSubmitPin');
    const btnRequestApproval = document.getElementById('btnRequestApproval');
    const toast = document.getElementById('toast');

    // Auto-detect device name
    const ua = navigator.userAgent;
    let defaultDeviceName = 'Mobile Device';
    if (/iPhone/i.test(ua)) defaultDeviceName = 'iPhone';
    else if (/iPad/i.test(ua)) defaultDeviceName = 'iPad';
    else if (/Android/i.test(ua)) defaultDeviceName = 'Android Device';
    else if (/Macintosh/i.test(ua)) defaultDeviceName = 'MacBook';
    deviceNameInput.value = defaultDeviceName;

    // PIN box focus advancement
    pinBoxes.forEach((box, index) => {
      box.addEventListener('input', (e) => {
        const val = e.target.value;
        if (val.length >= 1) {
          e.target.value = val.slice(-1);
          if (index < 3) pinBoxes[index + 1].focus();
        }
        if (getFullPin().length === 4) {
          submitPin();
        }
      });

      box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          pinBoxes[index - 1].focus();
        }
      });
    });

    function getFullPin() {
      return pinBoxes.map(b => b.value).join('');
    }

    function showToast(msg, type = 'info') {
      toast.textContent = msg;
      toast.className = `toast show ${type}`;
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }

    async function submitPin() {
      const pin = getFullPin();
      if (pin.length < 4) {
        showToast('Please enter the complete 4-digit PIN', 'error');
        return;
      }

      btnSubmitPin.disabled = true;
      btnSubmitPin.innerHTML = '<span>Verifying...</span>';

      try {
        const res = await fetch('/api/auth/verify-pin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            pin,
            deviceName: deviceNameInput.value.trim() || defaultDeviceName
          })
        });

        const data = await res.json();
        if (data.success && data.deviceToken) {
          showToast('Device Paired Successfully!', 'success');
          localStorage.setItem('airodrop_device_token', data.deviceToken);
          setTimeout(() => {
            window.location.href = '/m';
          }, 600);
        } else {
          showToast(data.error || 'Invalid PIN code', 'error');
          pinBoxes.forEach(b => b.value = '');
          pinBoxes[0].focus();
        }
      } catch (err) {
        showToast('Verification failed. Check network connection.', 'error');
      } finally {
        btnSubmitPin.disabled = false;
        btnSubmitPin.innerHTML = '<span>Unlock & Pair Device</span>';
      }
    }

    btnSubmitPin.addEventListener('click', submitPin);

    btnRequestApproval.addEventListener('click', async () => {
      btnRequestApproval.disabled = true;
      btnRequestApproval.innerHTML = '<span>Waiting for Host Approval on PC...</span>';
      showToast('Popup modal sent to PC. Please click Approve on your PC screen.', 'info');

      try {
        const res = await fetch('/api/auth/request-approval', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            deviceName: deviceNameInput.value.trim() || defaultDeviceName
          })
        });

        const data = await res.json();
        if (data.success && data.deviceToken) {
          showToast('Approved by Host! Unlocking...', 'success');
          localStorage.setItem('airodrop_device_token', data.deviceToken);
          setTimeout(() => {
            window.location.href = '/m';
          }, 600);
        } else {
          showToast(data.error || 'Host denied request', 'error');
        }
      } catch (err) {
        showToast('Request timed out or failed.', 'error');
      } finally {
        btnRequestApproval.disabled = false;
        btnRequestApproval.innerHTML = '<span>Request PC Host Approval</span>';
      }
    });
  </script>
</body>
</html>
