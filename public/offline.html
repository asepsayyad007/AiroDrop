<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AiroDrop — Offline</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="alternate icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo-192.png">
  <style>
    :root {
      --bg: #0a0a0f;
      --card: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent: #ff5500;
      --accent-glow: rgba(255, 85, 0, 0.3);
      --text: #f0f0f5;
      --text-muted: #8888a0;
      --radius: 20px;
    }
    
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 500px 350px at 20% 0%, rgba(255, 85, 0, 0.12), transparent),
        radial-gradient(ellipse 400px 400px at 80% 90%, rgba(255, 0, 85, 0.08), transparent);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 420px;
      width: 90%;
      padding: 40px 24px;
      text-align: center;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-container {
      width: 88px;
      height: 88px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 85, 0, 0.1);
      border-radius: 50%;
      border: 1.5px dashed var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
      animation: pulse 3s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--accent-glow); }
      50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 85, 0, 0.55); }
    }

    .icon-container svg {
      width: 44px;
      height: 44px;
      color: var(--accent);
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: -0.02em;
    }

    p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 30px 0;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #ff8800);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 15px var(--accent-glow);
      transition: all 0.2s ease;
      box-sizing: border-box;
      outline: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 85, 0, 0.45);
    }

    .btn:active {
      transform: translateY(0);
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-container">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-3.536 4.978 4.978 0 011.414-3.536m0 0L4.828 4.828M8.464 15.536L3 21M12 12v.01" />
      </svg>
    </div>
    
    <h1>Connection Lost</h1>
    <p>AiroDrop requires an active local network connection to transfer files. Please connect to your local WiFi and try again.</p>
    
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
    
    <div class="footer">
      Created by Asep with Love ❤️
    </div>
  </div>
</body>
</html>
